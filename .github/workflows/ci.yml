name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff (syntax + import checks)
        run: ruff check . --select E,F,W --ignore E501,E402 --exclude .venv,build,dist

  # ─── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --tb=short \
            -v \
            --cov=models \
            --cov=validation \
            --cov=interpreter \
            --cov=simulation \
            --cov=interface \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        # Only upload once (Python 3.11)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─── Import smoke test ─────────────────────────────────────────────────────
  import-check:
    name: Module import smoke test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke-test all public modules
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")

          modules = [
              "models",
              "models.protocol_models",
              "validation",
              "validation.protocol_validator",
              "interpreter",
              "interpreter.protocol_interpreter",
              "simulation",
              "simulation.object_library",
              "simulation.animation_pipeline",
              "simulation.blender_engine",
              "interface",
              "interface.cli",
          ]

          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f"  OK  {mod}")
              except Exception as e:
                  print(f"  FAIL  {mod}: {e}")
                  failed.append(mod)

          if failed:
              print(f"\n{len(failed)} module(s) failed to import.")
              sys.exit(1)
          else:
              print("\nAll modules imported successfully.")
          EOF

  # ─── Example protocol validation ───────────────────────────────────────────
  validate-examples:
    name: Validate example protocols
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate PCR preparation protocol
        run: python -m interface.cli validate examples/pcr_preparation.json

      - name: Validate NGS library preparation protocol
        run: python -m interface.cli validate examples/ngs_library_prep.json

      - name: Confirm error-demo protocol correctly fails validation
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, ".")
          from models.protocol_models import ProtocolModel
          from validation.protocol_validator import ProtocolValidator

          with open("examples/pcr_with_errors.json") as f:
              proto = ProtocolModel.model_validate(json.load(f))

          result = ProtocolValidator().validate(proto)
          assert not result.is_valid, "Error demo should FAIL validation"
          assert len(result.issues) >= 3, f"Expected ≥3 errors, got {len(result.issues)}"
          print(f"Error demo correctly detected {len(result.issues)} errors.")
          EOF

      - name: Run simulation summary (non-Blender preview)
        run: python run_simulation.py --protocol examples/pcr_preparation.json
